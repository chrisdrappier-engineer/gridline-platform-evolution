name: Container Baseline

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Run container baseline smoke test
        run: bin/ci
