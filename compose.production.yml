services:
  app:
    cpus: "${PRODUCTION_APP_CPUS:-1.0}"
    mem_limit: "${PRODUCTION_APP_MEMORY:-768m}"
    build:
      context: ./app
      target: production
    environment:
      RESOURCE_ENVELOPE: ${RESOURCE_ENVELOPE:-local-small}
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: ${RAILS_LOG_TO_STDOUT:-true}
      RAILS_SERVE_STATIC_FILES: ${RAILS_SERVE_STATIC_FILES:-true}
      RAILS_ASSUME_SSL: ${RAILS_ASSUME_SSL:-false}
      RAILS_FORCE_SSL: ${RAILS_FORCE_SSL:-false}
      RAILS_ALLOWED_HOSTS: ${RAILS_ALLOWED_HOSTS:-localhost,127.0.0.1,host.docker.internal,app}
      RAILS_MAX_THREADS: ${RAILS_MAX_THREADS:-5}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-1}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-local-production-secret-key-base-for-gridline-workload-lab}
      ACTIVE_STORAGE_SERVICE: ${ACTIVE_STORAGE_SERVICE:-local}
      ACTION_CABLE_ADAPTER: ${ACTION_CABLE_ADAPTER:-async}
      DATABASE_HOST: ${DATABASE_HOST:-db}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-gridline_production}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-gridline}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-gridline}
      GRIDLINE_STUB_USER_PASSWORD: ${GRIDLINE_STUB_USER_PASSWORD:-gridline}
    ports:
      - "${PRODUCTION_APP_PORT:-3001}:3000"
    volumes:
      - production_app_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bin/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  db:
    cpus: "${PRODUCTION_DB_CPUS:-1.0}"
    mem_limit: "${PRODUCTION_DB_MEMORY:-768m}"
    image: postgres:18.4-trixie
    environment:
      RESOURCE_ENVELOPE: ${RESOURCE_ENVELOPE:-local-small}
      POSTGRES_DB: ${POSTGRES_DB:-gridline_production}
      POSTGRES_USER: ${POSTGRES_USER:-gridline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gridline}
    volumes:
      - production_postgres_data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  production_postgres_data:
  production_app_storage:
