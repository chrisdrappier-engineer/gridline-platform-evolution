services:
  app:
    build:
      context: ./app
    environment:
      RAILS_ENV: ${RAILS_ENV:-development}
      RAILS_LOG_TO_STDOUT: ${RAILS_LOG_TO_STDOUT:-true}
      RAILS_MAX_THREADS: ${RAILS_MAX_THREADS:-5}
      DATABASE_HOST: ${DATABASE_HOST:-db}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-gridline_development}
      DATABASE_TEST_NAME: ${DATABASE_TEST_NAME:-gridline_test}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-gridline}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-gridline}
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - ./app:/app
      - app_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bin/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  db:
    image: postgres:18.4-trixie
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gridline_development}
      POSTGRES_USER: ${POSTGRES_USER:-gridline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gridline}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  postgres_data:
  app_storage:
